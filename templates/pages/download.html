{% extends 'components/base.html' %} 
{% block title %}Sxc Quiz Club - Home {% endblock %} 
{% block csslink %} 
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/download.css') }}"/>
{% endblock %}

{% block content %}
<div class="box">
    <h2>SXC QUIZ CLUB</h2>
    <p>Kindly enter your email properly</p>

    <label for="email">EMAIL</label>
    <input type="email" id="email" name="email" required/>

    <label for="event">SELECT EVENT</label>
    <select name="event" id="event" required>
      <option value="">-- Select Event --</option>
      <option value="independence-day-quiz">Independence Day Special Quiz</option>
      <option value="republic-day-quiz">Republic Day Quiz</option>
      <option value="science-day-quiz">National Science Day Quiz</option>
      <option value="quiz-fiesta">Quiz Fiesta</option>
    </select>
    <button>Download</button>
  </div>

{% endblock %}
